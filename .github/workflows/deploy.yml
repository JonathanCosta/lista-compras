name: Deploy GitHub Pages

on:
  push:
    branches: [main]

# Permissões necessárias para o deploy nativo via API do GitHub Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que deploys simultâneos não se atropelem
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar navegadores do Playwright
        run: npx playwright install --with-deps

      - name: Lint
        run: npm run lint

      - name: Build da Aplicação
        run: npm run build

      - name: Executar Testes E2E
        run: npx playwright test

      # PASSO NOVO: Sobe a pasta dist como um artefato do Pages
      - name: Upload do artefato de build
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # PASSO NOVO: Faz o deploy direto na infra do GitHub Pages
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4